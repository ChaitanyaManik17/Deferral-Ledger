# catalog/edges_india.yaml
# Deferral Ledger — India-Specific Edge-Prior Catalog (C-CAT-INDIA)
#
# Calibrated to India demographic and economic estimates (USD comparisons)

# E0  —  Replacement cost per connection line
- id: E0_cost_per_line
  from_node: defer_decision
  to_node: deferred_dollars
  dist_type: triangular
  params:
    low: 200.0
    mode: 600.0
    high: 1200.0
  point_estimate: 600.0
  ci_low: 200.0
  ci_high: 1200.0
  source: >
    Synthetic India Prior: Calibrated to municipal water service network connection
    remediation and labor cost estimates in urban South Asia (2026).
  effect_size: "$600 average replacement cost per connection line (2026 USD)"
  units: "USD per service line"
  contested: false
  enabled: true
  last_validated: "2026-06-19"
  notes: >
    Lower mode reflects lower local excavation and labor costs in India.

# E1  —  LSL presence → sustained BLL increment (µg/dL) while LSL in ground
- id: E1_lsl_to_bll
  from_node: continued_exposure_person_years
  to_node: bll_increment_ugdl
  dist_type: triangular
  params:
    low: 1.0
    mode: 3.5
    high: 8.0
  point_estimate: 3.5
  ci_low: 1.0
  ci_high: 8.0
  source: >
    Synthetic India Prior: Adjusted for nutritional co-factors (calcium/iron deficiency)
    which double gastrointestinal lead absorption, and higher ambient co-exposures.
  effect_size: "~+3.5 µg/dL BLL increment (range 1.0–8.0) while LSL present"
  units: "µg/dL blood lead per year of LSL exposure"
  contested: false
  enabled: true
  last_validated: "2026-06-19"
  notes: >
    Higher mode and bounds reflect elevated risk of lead uptake under South Asian
    nutritional profiles.

# E2  —  BLL (µg/dL) → IQ loss (IQ points)
- id: E2_bll_to_iq
  from_node: bll_increment_ugdl
  to_node: iq_loss_points
  dist_type: normal
  params:
    mean: -0.87
    sd: 0.14
  point_estimate: -0.87
  ci_low: -1.10
  ci_high: -0.64
  source: >
    Lanphear BP et al., 2005 pooled international analysis (retained for global
    consistency of biological response).
  effect_size: "−0.87 IQ pts per 1 µg/dL BLL"
  units: "IQ points per µg/dL BLL"
  contested: false
  enabled: true
  last_validated: "2026-06-19"
  notes: >
    Retained standard international slope for comparability.

# E3  —  IQ loss → lifetime earnings loss ($)
- id: E3_iq_to_earnings
  from_node: iq_loss_points
  to_node: lifetime_earnings_loss_dollars
  dist_type: uniform
  params:
    low: 600.0
    high: 1800.0
  point_estimate: 1200.0
  ci_low: 600.0
  ci_high: 1800.0
  source: >
    Synthetic India Prior: Calibrated to lifetime earnings projections in India
    adjusted for purchasing power parity (PPP).
  effect_size: "$600–$1,800 per IQ point lost (3% discount rate, local PPP USD)"
  units: "USD per IQ point (present value, 3% discount)"
  contested: false
  enabled: true
  last_validated: "2026-06-19"
  notes: >
    Adjusted down to match lifetime gross earnings scale in India.

