# E6  —  Adult cumulative BLL → cardiovascular / CKD mortality & morbidity cost
- id: E6_adult_bll_to_cvd_ckd
  from_node: bll_increment_ugdl
  to_node: adult_cvd_ckd_cost_dollars
  dist_type: lognormal
  params:
    mu: 0.5306
    sigma: 0.1627
  point_estimate: 1.70
  ci_low: 1.30
  ci_high: 2.22
  source: >
    Lanphear BP et al., 2018 (retained for hazard ratio).
  effect_size: "HR 1.70 (95% CI 1.30–2.22) for CVD mortality"
  units: "Hazard ratio (dimensionless)"
  contested: false
  enabled: false
  last_validated: "2026-06-19"
  notes: >
    Secondary edge, off by default.

