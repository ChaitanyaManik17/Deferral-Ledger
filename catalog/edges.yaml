# catalog/edges.yaml
# Deferral Ledger — Edge-Prior Catalog (C-CAT)
#
# SRS EV-1 / C-4: every edge MUST carry `source` and `last_validated`.
# The catalog loader (catalog.py) FAILS the build if either field is absent.
#
# Distribution params conventions:
#   normal     : {mean, sd}           sd ≈ (ci_high - ci_low) / 3.29
#   lognormal  : {mu, sigma}          mu = ln(median), sigma from CI
#   triangular : {low, mode, high}    mode = best estimate; low/high = plausible range
#   uniform    : {low, high}          equal-weight over range
#   point      : {value}              deterministic (no uncertainty modelled)
#
# Cascade: Defer Δyr → deferred$ → exposure → BLL → IQ/sped/healthcare/CVD/crime

# ══════════════════════════════════════════════════════════════════════════════
# E0  —  Replacement cost per service line
# ══════════════════════════════════════════════════════════════════════════════
- id: E0_cost_per_line
  from_node: defer_decision
  to_node: deferred_dollars
  dist_type: triangular
  params:
    low: 1200.0
    mode: 4700.0
    high: 12300.0
  point_estimate: 4700.0
  ci_low: 1200.0
  ci_high: 12300.0
  source: >
    EPA LCRI fact sheet, "Calculating Service Line Replacement Cost" (Oct 2024).
    Average cost ~$4,700/line; range $1,200–$12,300.
    URL: https://www.epa.gov/system/files/documents/2024-10/final_lcri_fact-sheet_calculating-service-line.pdf
  effect_size: "$4,700 average replacement cost per lead service line (2024 USD)"
  units: "USD per service line"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    Mode = EPA reported average. Low = low-end small-diameter replacements;
    High = complex urban excavations. Triangular captures right-skew in costs.

# ══════════════════════════════════════════════════════════════════════════════
# E1  —  LSL presence → sustained BLL increment (µg/dL) while LSL in ground
# ══════════════════════════════════════════════════════════════════════════════
- id: E1_lsl_to_bll
  from_node: continued_exposure_person_years
  to_node: bll_increment_ugdl
  dist_type: triangular
  params:
    low: 0.5
    mode: 1.5
    high: 4.0
  point_estimate: 1.5
  ci_low: 0.5
  ci_high: 4.0
  source: >
    ⚠ WIDE PRIOR — top research priority (see DAY1_CHAITANYA_TASKS.md).
    Evidence basis: Hanna-Attisha et al. 2016 (AJPH) — Flint pre/post analysis
    showed percentage of children with elevated BLL (~5 µg/dL) roughly doubled
    during LSL-related contamination (~2–4× relative increase, absolute BLL
    increments of ~1–3 µg/dL in affected areas). EPA IEUBK model water-lead
    contribution estimates 0.5–3 µg/dL from lead plumbing depending on fixture
    age, flow, and standing time. Newark pre/post (2019–2021) reported ~1–2 µg/dL
    median reductions post-replacement in high-risk areas.
    Primary ref: Hanna-Attisha M et al., "Elevated Blood Lead Levels in Children
    Associated With the Flint Drinking Water Crisis," Am J Public Health 2016;
    106(2):283-290. DOI: 10.2105/AJPH.2015.302896
    Supporting: EPA IEUBK model guidance; del Toral et al. 2016 (ES&T).
  effect_size: "~+1.5 µg/dL BLL increment (range 0.5–4.0) while LSL present"
  units: "µg/dL blood lead per year of LSL exposure"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    DELIBERATELY WIDE prior — reflects genuine epistemic uncertainty.
    Day-2 Sobol analysis expected to show E1 dominates the spread,
    which is itself a finding: 'commission a water-lead study first.'
    If BLL data from the target tract become available, this prior
    should be narrowed accordingly (recalibration trigger LC-2).

# ══════════════════════════════════════════════════════════════════════════════
# E2  —  BLL (µg/dL) → IQ loss (IQ points)
# ══════════════════════════════════════════════════════════════════════════════
- id: E2_bll_to_iq
  from_node: bll_increment_ugdl
  to_node: iq_loss_points
  dist_type: normal
  params:
    # sd ≈ (ci_high - ci_low) / 3.29  = (−0.64 − (−1.10)) / 3.29 ≈ 0.14
    mean: -0.87
    sd: 0.14
  point_estimate: -0.87
  ci_low: -1.10
  ci_high: -0.64
  source: >
    Lanphear BP et al., "Low-level environmental lead exposure and children's
    intellectual function: an international pooled analysis," Environ Health
    Perspect 2005; 113(7):894–899. DOI: 10.1289/ehp.7688.
    Pooled analysis of 7 prospective cohorts; overall slope −0.87 IQ pts/µg/dL
    (95% CI −1.10 to −0.64). Steeper slope −1.37 IQ pts/µg/dL below 10 µg/dL.
    Referenced in SRS as [R4].
  effect_size: >
    −0.87 IQ pts per 1 µg/dL BLL (steeper at −1.37 IQ pts below 10 µg/dL);
    using the overall slope as the conservative, policy-applicable estimate
  units: "IQ points per µg/dL BLL"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    Using overall pooled slope for the deterministic Day-1 run.
    The steeper low-level slope (−1.37) should be considered as a
    sensitivity scenario for tracts with BLL < 10 µg/dL.
    Normal distribution sd derived from 95% CI using sd=(hi−lo)/3.29.

# ══════════════════════════════════════════════════════════════════════════════
# E3  —  IQ loss → lifetime earnings loss ($)
# ══════════════════════════════════════════════════════════════════════════════
- id: E3_iq_to_earnings
  from_node: iq_loss_points
  to_node: lifetime_earnings_loss_dollars
  dist_type: uniform
  params:
    low: 10600.0
    high: 13100.0
  point_estimate: 11850.0
  ci_low: 10600.0
  ci_high: 13100.0
  source: >
    Primary: Grosse SD et al., "Estimated IQ points and lifetime earnings lost
    to early-childhood blood lead levels in the United States, 1997–2018,"
    Sci Total Environ 2021; 787:147452. DOI: 10.1016/j.scitotenv.2021.147452.
    Approx. $10,600–$13,100 per IQ point at 3% discount rate.
    URL: https://www.sciencedirect.com/science/article/abs/pii/S0048969721013759
    Secondary: Unleaded Kids, "Calculating IQ-Related Increased Lifetime Earnings"
    (2025-03-04). IQ point ≈ 1.4% of lifetime earnings (3% discount).
    URL: https://unleadedkids.org/special-series-iq/2025/03/04/
    Referenced in SRS as [R5, R6].
  effect_size: "$10,600–$13,100 per IQ point lost (3% discount rate)"
  units: "USD per IQ point (present value, 3% discount)"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    Uniform distribution captures the reported range directly.
    Point estimate = midpoint $11,850. Discount rate 3% per SRS default.
    Inflation: Grosse et al. 2021 figures are in approximate 2019 USD;
    to update to 2026 USD apply CPI adjustment (~+13–16%).

# ══════════════════════════════════════════════════════════════════════════════
# E4  —  BLL → special-education placement cost ($)
# ══════════════════════════════════════════════════════════════════════════════
- id: E4_bll_to_sped
  from_node: bll_increment_ugdl
  to_node: special_education_cost_dollars
  dist_type: triangular
  params:
    # Gould 2009 lumped estimate: ~$5,600/child med+sped (1998 USD).
    # Inflated to 2026 USD: ~$10,200 (CPI ×1.82).
    # EPA NCEE 2025 working paper puts special-ed at ~$12,833/yr × ~3 yr ~$38,500
    # but that is the total special-ed cost; lead-attributable fraction ~15–25%.
    # Triangular: low=$4,000 (conservative), mode=$11,000, high=$25,000.
    low: 4000.0
    mode: 11000.0
    high: 25000.0
  point_estimate: 11000.0
  ci_low: 4000.0
  ci_high: 25000.0
  source: >
    Primary: Gould E, "Childhood lead poisoning: conservative estimates of the
    social and economic benefits of lead hazard control," Environ Health Perspect
    2009; 117(7):1162–1167. DOI: 10.1289/ehp.0800408.
    PMC: https://pmc.ncbi.nlm.nih.gov/articles/PMC2717145/
    Gould reports combined medical + special-education cost ~$5,600/child (1998 USD).
    Inflated to 2026 USD (~×1.82 CPI) ≈ $10,200.
    Secondary: EPA NCEE Working Paper 2025-04 (April 2025), "Lead Exposure and
    Special Education: A New Cost Estimate." Estimates annual incremental special-ed
    cost ~$12,833 (NCES data), lead-attributable fraction applied.
    URL: https://www.epa.gov/system/files/documents/2025-10/2025_04.pdf
    Also: NCHH, "The Cost of Inaction: The Economic and Health Burden of Lead
    Exposure in the United States."
  effect_size: >
    ~$11,000 per child incremental special-education cost attributable to
    lead-elevated BLL (range $4,000–$25,000; 2026 USD estimate)
  units: "USD per child (present value)"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    Triangular prior captures wide uncertainty in attributable fraction and
    inflation methodology. Mode reflects Gould 2009 inflated estimate.
    Upper end reflects EPA NCEE 2025 higher attribution scenarios.
    Recommend narrowing this prior with a tract-specific special-ed rate
    as a Day-2 improvement.

# ══════════════════════════════════════════════════════════════════════════════
# E5  —  BLL → childhood healthcare / Medicaid cost ($)
# ══════════════════════════════════════════════════════════════════════════════
- id: E5_bll_to_healthcare
  from_node: bll_increment_ugdl
  to_node: childhood_healthcare_cost_dollars
  dist_type: triangular
  params:
    # Trasande & Liu 2011: total childhood environmental-disease burden ~$76.6B/year (2008 USD).
    # Lead accounts for ~30–38% of that burden → ~$23–$29B/year.
    # ~4M children under 6 with elevated BLL (historic) → ~$5,750–$7,250/child.
    # Inflated to 2026 USD (~×1.48 CPI from 2008) → ~$8,500–$10,700/child.
    # Conservative low (medical management only, narrow attribution): ~$3,000.
    low: 3000.0
    mode: 7500.0
    high: 12000.0
  point_estimate: 7500.0
  ci_low: 3000.0
  ci_high: 12000.0
  source: >
    Primary: Trasande L, Liu Y, "Reducing the staggering costs of environmental
    disease in children, estimated at $76.6 billion in 2008," Health Affairs 2011;
    30(5):863–870. DOI: 10.1377/hlthaff.2010.1239.
    URL: https://www.healthaffairs.org/doi/full/10.1377/hlthaff.2010.1239
    Lead accounted for an estimated $50.9B of the $76.6B total 2008 childhood
    environmental-disease burden (mental retardation + associated costs).
    Per-child estimate derived by dividing lead-attributable burden by the
    number of affected children and inflating from 2008 to 2026 USD (×~1.48 CPI).
  effect_size: >
    ~$7,500 per child childhood healthcare / Medicaid cost attributable to
    lead exposure (range $3,000–$12,000; 2026 USD estimate)
  units: "USD per child (present value)"
  contested: false
  enabled: true
  last_validated: "2026-06-14"
  notes: >
    Wide triangular prior reflects uncertainty in per-child decomposition
    from the aggregate burden estimate. Trasande & Liu 2011 is the primary
    source for the total burden; the per-child breakdown involves additional
    attribution assumptions documented here. Mode chosen as a central
    estimate consistent with published ranges.

# ══════════════════════════════════════════════════════════════════════════════
# E6  —  Adult cumulative BLL → cardiovascular / CKD mortality & morbidity cost
#         STATUS: Secondary / OFF by default
# ══════════════════════════════════════════════════════════════════════════════
- id: E6_adult_bll_to_cvd_ckd
  from_node: bll_increment_ugdl
  to_node: adult_cvd_ckd_cost_dollars
  dist_type: lognormal
  params:
    # Lanphear 2018: HR 1.70 (95% CI 1.30–2.22) for CVD mortality per ~5.7 µg/dL BLL.
    # Log-normal on HR: mu = ln(1.70) ≈ 0.5306; sigma from CI:
    #   sigma = (ln(2.22) - ln(1.30)) / 3.29 = (0.7975 - 0.2624) / 3.29 ≈ 0.1627
    # Cost conversion: VSL-based. EPA VSL 2024 ~$13.1M.
    # Attributable CVD deaths (Lanphear 2018 estimates ~256k/yr lead-attributable).
    # For per-µg/dL per-child model, use incremental lifetime CVD mortality risk
    # and multiply by VSL. This is a long-horizon secondary edge.
    # params here are the log-normal parameters on the HAZARD RATIO:
    mu: 0.5306
    sigma: 0.1627
  point_estimate: 1.70
  ci_low: 1.30
  ci_high: 2.22
  source: >
    Lanphear BP et al., "Low-level lead exposure and mortality in US adults:
    a population-based cohort study," Lancet Public Health 2018; 3(4):e177–e184.
    DOI: 10.1016/S2468-2667(18)30025-2.
    URL: https://www.sciencedirect.com/science/article/pii/S2468266718300252
    HR 1.70 (95% CI 1.30–2.22) for CVD mortality; ~256,000 premature
    CVD deaths/year in the US attributable to lead exposure.
    VSL assumption: EPA 2024 VSL ~$13.1M (2024 USD) per EPA Guidelines for
    Preparing Economic Analyses (2023 update).
  effect_size: >
    HR 1.70 (95% CI 1.30–2.22) for CVD mortality per ~5.7 µg/dL BLL increase.
    Cost estimated via VSL and incremental lifetime mortality risk.
  units: "Hazard ratio (dimensionless); cost in USD via VSL conversion"
  contested: false
  enabled: false
  last_validated: "2026-06-14"
  notes: >
    SECONDARY EDGE — off by default. Long-horizon effect requiring lifetime
    BLL accumulation model. VSL conversion assumption is explicit and documented.
    Enabling this edge substantially widens the multiplier distribution.
    Document VSL assumption clearly when reporting results with this edge enabled.
    The params encode the HR log-normal; the cost node applies VSL conversion
    separately in dag.py.

# ══════════════════════════════════════════════════════════════════════════════
# E7  —  BLL → behavioral / ADHD → juvenile-justice / crime cost
#         STATUS: CONTESTED / OFF by default (SRS RAI-1)
# ══════════════════════════════════════════════════════════════════════════════
- id: E7_bll_to_crime
  from_node: bll_increment_ugdl
  to_node: juvenile_justice_crime_cost_dollars
  dist_type: lognormal
  params:
    # Aizer & Currie 2017: +15% increased risk of detention/incarceration
    # per 1 µg/dL preschool BLL.
    # Risk ratio (RR) = 1.15; log-normal on RR:
    #   mu = ln(1.15) ≈ 0.1398
    #   CI from study: ~RR 1.05–1.26 → sigma = (ln(1.26)-ln(1.05))/3.29 ≈ 0.0584
    mu: 0.1398
    sigma: 0.0584
  point_estimate: 1.15
  ci_low: 1.05
  ci_high: 1.26
  source: >
    Aizer A, Currie J, "Lead and juvenile delinquency: new evidence from
    linked birth, school and juvenile detention records," NBER Working Paper
    No. 23392 (May 2017). DOI: 10.3386/w23392.
    URL: https://www.nber.org/system/files/working_papers/w23392/w23392.pdf
    +15% (approx.) increased detention/incarceration risk per 1 µg/dL
    preschool BLL. Cost-of-crime conversion uses standard justice system
    cost estimates (~$35,000–$60,000/year incarceration, Bureau of Justice
    Statistics 2022).
  effect_size: >
    RR ~1.15 (approx. 95% CI 1.05–1.26) for juvenile detention per 1 µg/dL
    preschool BLL; cost via justice system per-incarceration estimates
  units: "Risk ratio (dimensionless); cost in USD per incident"
  contested: true
  enabled: false
  last_validated: "2026-06-14"
  notes: >
    CONTESTED EDGE — off by default (SRS RAI-1, FR-DASH-3).
    Rationale: causal pathway to criminal-justice involvement is
    stigmatizing for affected communities. Including it in a default
    public analysis risks being weaponized against those communities.
    Available for internal, consented analysis only. Enabling this edge
    must be an explicit, logged user action.
    Named tradeoff: excluding understates total long-run cost but prevents
    stigmatizing framing. This is a deliberate responsible-AI design choice.
